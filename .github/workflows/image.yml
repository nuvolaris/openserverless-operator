name: Build OpenServerless Operator

on:
  push:
    tags:
    - '[0-9]*'
  workflow_dispatch:
    inputs:
      operator_tag:
        description: "Operator tag to build and publish"
        required: false
        default: ""
      operator_image:
        description: "Operator image repository"
        required: false
        default: ""
      testing_targets:
        description: "Comma-separated testing targets"
        required: false
        default: "kind,k3s"
jobs:
  image:
    name: Build OpenServerless Operator Image
    runs-on: ubuntu-22.04
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"    
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: License
        uses: apache/skywalking-eyes@main
      - name: Resolve release context
        run: |
          if test -n "${{ inputs.operator_tag }}"
          then
            IMG_TAG="${{ inputs.operator_tag }}"
          else
            IMG_TAG="$(git describe --tags --abbrev=0)"
          fi
          MY_OPERATOR_IMAGE="${{ inputs.operator_image || vars.OPERATOR_IMAGE || 'apache/openserverless-operator' }}"
          if [[ "$MY_OPERATOR_IMAGE" == ghcr.io/* ]]
          then
            IMAGE_REGISTRY="ghcr.io"
          else
            IMAGE_REGISTRY="docker.io"
          fi
          echo "IMG_TAG=${IMG_TAG}" >> "$GITHUB_ENV"
          echo "OPERATOR_TAG=${IMG_TAG}" >> "$GITHUB_ENV"
          echo "MY_OPERATOR_IMAGE=${MY_OPERATOR_IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY}" >> "$GITHUB_ENV"
          echo "TESTING_TARGETS=${{ inputs.testing_targets || vars.TESTING_TARGETS || 'kind,k3s' }}" >> "$GITHUB_ENV"
      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY == 'ghcr.io' && github.repository_owner || secrets.DOCKERHUB_USER }}
          password: ${{ env.IMAGE_REGISTRY == 'ghcr.io' && secrets.GITHUB_TOKEN || secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Image
        run: task buildx-and-push TAG="$IMG_TAG"
      - name: Trigger openserverless-testing
        env:
          GH_TOKEN: ${{ secrets.OPENSERVERLESS_TESTING_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          TESTING_REPO_OWNER: ${{ github.repository_owner }}
        run: bash .github/dispatch-testing-tags.sh
